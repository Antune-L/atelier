<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Atelier</title>
    <script>
      // Apply the stored theme before first paint to avoid a flash of the default palette.
      (function () {
        var classes = { "deep-ocean": "theme-deep-ocean", dark: "dark" };
        var theme = localStorage.getItem("theme");
        var className = classes[theme];
        if (className) document.documentElement.classList.add(className);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
